version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: tjlibmanager-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tjlibmanager
      MYSQL_USER: tjlib
      MYSQL_PASSWORD: tjlib123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - tjlib-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tjlibmanager-backend
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/tjlibmanager?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: tjlib
      SPRING_DATASOURCE_PASSWORD: tjlib123
      SPRING_PROFILES_ACTIVE: json
    ports:
      - "8081:8080"
    networks:
      - tjlib-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tjlibmanager-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4200:80"
    networks:
      - tjlib-network

volumes:
  mysql_data:

networks:
  tjlib-network:
    driver: bridge
